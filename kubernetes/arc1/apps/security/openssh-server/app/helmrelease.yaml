---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openssh-server
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      openssh-server:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/openssh-server
              tag: latest@sha256:ecc58e9c86bfeefe1b0e98d5d55cade951a45085a0b4b29a6773357b129946de
            env:
              USER_NAME: amelie
              SUDO_ACCESS: false
            envFrom:
              - secretRef:
                  name: openssh-server-secret
            resources:
              requests:
                cpu: 5m
                memory: 512Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: openssh-server
        ports:
          ssh:
            port: 2222
    persistence:
      config:
        type: emptyDir
      tmp:
        type: emptyDir
